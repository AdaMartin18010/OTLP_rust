# Cargo Deny 配置
# 
# 用于检查依赖许可证、安全漏洞和禁止的 crate
# 参考: https://embarkstudios.github.io/cargo-deny/

# 目标平台
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-unknown-linux-gnu" },
]

# ==================== 依赖图检查 ====================
[graph]
# 允许的最小 rustc 版本
rust-version = "1.85.0"

# ==================== 输出格式 ====================
[output]
feature-depth = 1

# ==================== 安全检查 ====================
[advisories]
# 版本范围忽略（用于暂时无法更新的情况）
ignore = [
    # 示例: "RUSTSEC-2021-0123", 
]

# 安全数据库
[advisories.db]
# 使用官方安全数据库
url = "https://github.com/rustsec/advisory-db"

# ==================== 许可证检查 ====================
[licenses]
# 允许的开源许可证
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unlicense",
    "MPL-2.0",
    "CC0-1.0",
    "Zlib",
    "0BSD",
]

# 拒绝的许可证
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
]

# 未识别的许可证处理
unlicensed = "deny"

# 复制左许可证处理
copyleft = "warn"

# 允许模糊匹配
allow-osi-fsf-free = "either"

# 允许配置文件中的显式许可证
default = "deny"

# 置信度阈值
confidence-threshold = 0.8

# 例外（明确指定某些 crate 的许可证）
exceptions = [
    # 示例:
    # { allow = ["OpenSSL"], name = "ring", version = "*" },
]

# 使用 SPDX 表达式指定多个许可证
[[licenses.clarify]]
name = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

# ==================== 禁止的 crate ====================
[ban]
# 多版本检查
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

# 跳过多版本检查的 crate（这些是允许多版本的）
skip = [
    # 示例: { name = "syn", version = "1.0" },
]

# 跳过分支检查的 crate
skip-tree = [
    # 示例: { name = "windows-sys", version = "0.48" },
]

# 明确禁止的 crate
[ban.crates]
# 禁止使用不安全的 rand 版本
# { name = "rand", version = "<0.8", reason = "Security vulnerabilities" }

# ==================== 允许的 crate 源 ====================
[sources]
# 允许的 crate 注册表
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]

# 允许的 Git 源
allow-git = [
    # 示例: "https://github.com/your-org/your-crate",
]

# 未知来源处理
unknown-registry = "warn"
unknown-git = "warn"

# ==================== 构建脚本检查 ====================
[sources.allow-build-scripts]
# 允许运行构建脚本的 crate
# 示例: ["libc", "syn"]

# ==================== 特性检查 ====================
[bans.features]
# 必须启用的特性
# must-have = ["std"]

# 禁止的特性
# must-not-have = ["deprecated"]
