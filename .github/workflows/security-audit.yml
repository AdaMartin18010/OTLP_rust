name: Security Audit

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # 每天运行一次
    - cron: '0 0 * * *'

env:
  CARGO_TERM_COLOR: always
  # 使用 LLD 链接器加速构建
  RUSTFLAGS: "-C link-arg=-fuse-ld=lld"

jobs:
  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      
      - name: Run cargo audit
        run: cargo audit --deny warnings
        continue-on-error: false

  cargo-vet:
    name: Supply Chain Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      
      - name: Install cargo-vet
        run: cargo install cargo-vet --locked
      
      - name: Run cargo vet
        run: cargo vet --locked
        continue-on-error: true  # 允许失败，因为可能需要初始配置

  cargo-deny:
    name: License and Advisory Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      
      - name: Run cargo deny
        run: cargo deny check
        continue-on-error: false

  semver-checks:
    name: Semver Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      
      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked
      
      - name: Check semver
        run: cargo semver-checks check-release
        continue-on-error: true  # 开发阶段允许失败

  msrv-check:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@master
        with:
          toolchain: 1.85.0  # MSRV
      
      - name: Check MSRV
        run: cargo check --all-features
        continue-on-error: false
