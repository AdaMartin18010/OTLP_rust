# Cargo 配置 - Edition 2024 优化
# https://doc.rust-lang.org/cargo/reference/config.html

[build]
# 默认目标平台
target = "x86_64-pc-windows-msvc"

# 传递给 rustc 的标志
rustflags = [
    "-C", "target-cpu=native",
    "-C", "opt-level=3",
    # "-D", "warnings",  # 暂时禁用，修复完所有警告后再启用
]

[term]
# 彩色输出
quiet = false
verbose = false
color = "auto"

[net]
# 网络重试设置
retry = 3
git-fetch-with-cli = true

[registries.crates-io]
protocol = "sparse"

[resolver]
# Edition 2024: MSRV-aware resolver
# Falls back to older versions if rust-version is incompatible
incompatible-rust-versions = "fallback"

[profile.dev]
# 开发构建优化
opt-level = 0
debug = true
debug-assertions = true
overflow-checks = true
lto = false
panic = "unwind"
incremental = true
codegen-units = 256

[profile.release]
# 发布构建优化 - 最大化性能
opt-level = 3
debug = false
debug-assertions = false
overflow-checks = false
lto = "fat"
panic = "abort"
codegen-units = 1
strip = "symbols"

[profile.test]
# 测试构建优化
opt-level = 1
debug = true
debug-assertions = true
overflow-checks = true

[profile.bench]
# 基准测试优化
opt-level = 3
debug = false
lto = "thin"
